  <meta property="og:url" content="https://soghayarmahmoud.github.io/procode-edu-pulse-lms/">
  
  <title>ProCode EduPulse — Learn to Code | Interactive LMS</title>
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/navbar.css">
  <link rel="stylesheet" href="./css/landing.css">
  <link rel="stylesheet" href="./css/lesson.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="./css/pages.css">
  <link rel="stylesheet" href="./css/analytics.css">
  <link rel="stylesheet" href="./css/ai-recommendations.css">
  <link rel="stylesheet" href="./css/collaborative-coding.css">
</head>
<body>
  <!-- App Mount Point -->
  <div id="app" class="page-wrapper">
    <!-- Loading State -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px">
      <div style="width:40px;height:40px;border:3px solid var(--border-subtle);border-top-color:var(--brand-primary);border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <p style="color:var(--text-muted);font-size:14px">Loading ProCode EduPulse...</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Back to Top Button -->
  <button id="back-to-top" class="back-to-top" title="Back to top"><i class="fa-solid fa-arrow-up"></i></button>

  <!-- Markdown Rendering + Sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>

  <!-- App Script -->
  <script type="module" src="./js/app.js"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('[SW] Service Worker registered successfully:', registration.scope);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available
                  if (confirm('New version available! Reload to update?')) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch((error) => {
            console.error('[SW] Service Worker registration failed:', error);
          });
      });
    }
    
    // PWA Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show install button (you can customize this)
      const installButton = document.createElement('button');
      installButton.innerHTML = '📱 Install App';
      installButton.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        background: var(--brand-gradient);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        z-index: 1000;
        box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
        transition: all 0.3s ease;
      `;
      
      installButton.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`[PWA] Install prompt ${outcome}`);
          deferredPrompt = null;
          installButton.remove();
        }
      });
      
      installButton.addEventListener('mouseenter', () => {
        installButton.style.transform = 'translateY(-2px)';
        installButton.style.boxShadow = '0 6px 16px rgba(0, 120, 212, 0.4)';
      });
      
      installButton.addEventListener('mouseleave', () => {
        installButton.style.transform = 'translateY(0)';
        installButton.style.boxShadow = '0 4px 12px rgba(0, 120, 212, 0.3)';
      });
      
      document.body.appendChild(installButton);
    });
  </script>
</body>
</html>
